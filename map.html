<head>

  <meta name="keywords" content="NASA EONET, sự kiện thiên nhiên, bão, cháy rừng, núi lửa, lũ lụt, theo dõi thiên tai, earth observatory" />
  <meta name="author" content="EONET Explorer" />

  <link rel="canonical" href="https://eonet-explorer.app/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="EONET Explorer — Theo Dõi Sự Kiện Thiên Nhiên NASA" />
  <meta property="og:description" content="Khám phá và theo dõi các sự kiện thiên nhiên toàn cầu theo thời gian thực từ NASA EONET API." />
  <meta property="og:url" content="https://eonet-explorer.app/" />
  <meta property="og:image" content="https://eonet-explorer.app/assets/images/og-image.jpg" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="EONET Explorer — Theo Dõi Sự Kiện Thiên Nhiên NASA" />
  <meta name="twitter:description" content="Theo dõi các sự kiện thiên nhiên toàn cầu theo thời gian thực từ NASA." />
  <meta name="twitter:image" content="https://eonet-explorer.app/assets/images/og-image.jpg" />

  <!-- Schema.org Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "EONET Explorer",
    "description": "Theo dõi sự kiện thiên nhiên toàn cầu từ NASA EONET",
    "url": "https://eonet-explorer.app/",
    "applicationCategory": "ScienceApplication",
    "operatingSystem": "All",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "provider": { "@type": "Organization", "name": "NASA EONET", "url": "https://eonet.gsfc.nasa.gov/" }
  }
  </script>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://eonet.gsfc.nasa.gov" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
</head>
<body>

  <header id="main-header" role="banner">
    <div class="header-inner">
      <a href="/" class="logo-wrap" aria-label="EONET Natural Event Tracker Home">
        <!-- SVG Earth Icon -->
        <div class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="22" cy="22" r="20" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
            <circle cx="22" cy="22" r="15" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 2"/>
            <circle cx="22" cy="22" r="8" fill="#00d4ff" opacity="0.15"/>
            <circle cx="22" cy="22" r="3" fill="#00d4ff"/>
            <!-- Orbit lines -->
            <ellipse cx="22" cy="22" rx="20" ry="8" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
            <!-- Blink dot -->
            <circle cx="32" cy="12" r="3" fill="#ff6b35" opacity="0.9">
              <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.5s" repeatCount="indefinite"/>
            </circle>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">EONET</span>
          <span class="logo-sub">NASA Earth Observatory</span>
        </div>
      </a>

      <div class="header-status" role="status" aria-live="polite">
        <div class="status-indicator">
          <div class="status-dot" aria-label="API Online"></div>
          <span>API LIVE</span>
        </div>
        <div class="live-clock" id="live-clock" aria-label="Current UTC time">--:--:-- UTC</div>
      </div>
    </div>
  </header>


  <!-- ===== MAP SECTION ===== -->
  <section id="map-section">
  <div class="map-wrapper">
    <div id="eventsMap"></div>

    <!-- Legend -->
    <div class="map-legend">
      <div class="legend-title">Legend</div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#ff4444"></span> Forest Fire
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#4488ff"></span> Storm / Flood
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#ff8800"></span> Volcano
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#44cc88"></span> Other
      </div>
    </div>

    <!-- Stats -->
    <div class="map-stats-overlay">
      <span id="mapEventCount">— dots</span>
    </div>
  </div>
</section>

<footer role="contentinfo">
    <div class="footer-inner">
      <div class="footer-text">
        Data powered by&nbsp;
        <a href="https://eonet.gsfc.nasa.gov/api/v3/events" target="_blank" rel="noopener noreferrer" aria-label="NASA EONET API">
          NASA EONET API v3
        </a>
        &nbsp;·&nbsp;
        <a href="https://eonet.gsfc.nasa.gov/" target="_blank" rel="noopener noreferrer">
          eonet.gsfc.nasa.gov
        </a>
      </div>
      <div class="footer-text">
        &copy; <span id="year"></span> Earth Observatory Natural Event Tracker
      </div>
      <div class="footer-text">
        Interface developed by&nbsp;
        <a href="https://github.com/vubinh127" target="_blank" rel="noopener noreferrer">vubinh127</a>
      </div>
      <div class="footer-text">
        Donate:&nbsp;
        <a href="https://paypal.me/bowtuckle127" target="_blank" rel="noopener noreferrer">paypal.me/bowtuckle127</a>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="assets/js/map.js"></script>
</body>
</html>
